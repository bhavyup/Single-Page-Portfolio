<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C75D3A"/>
      <stop offset="100%" stop-color="#E08A5A"/>
    </linearGradient>
    <clipPath id="clip">
      <rect x="8" y="8" width="104" height="104" rx="26"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <rect width="120" height="120" rx="28" fill="#0D0D0C"/>
  <!-- Subtle border -->
  <rect x="1" y="1" width="118" height="118" rx="27" fill="none" stroke="#1A1A19" stroke-width="1"/>
  <!-- Letter B -->
  <g clip-path="url(#clip)">
    <text x="28" y="90" font-family="Georgia, 'Times New Roman', serif" font-size="82" font-weight="700" fill="#F4EDE6" letter-spacing="-2">B</text>
  </g>
  <!-- Accent dot -->
  <circle cx="92" cy="88" r="10" fill="url(#g)"/>
  <!-- Subtle inner glow -->
  <circle cx="92" cy="88" r="6" fill="#E08A5A" opacity="0.3"/>
</svg>
